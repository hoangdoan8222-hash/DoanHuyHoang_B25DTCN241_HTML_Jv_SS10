<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Manager Pro</title>
</head>
<body>

<script>
let squad = [
    { id: 1, name: "Nguyen Van A", goals: 10, position: "FW" },
    { id: 2, name: "Tran Van B", goals: 5,  position: "MF" },
    { id: 3, name: "Le Van C",   goals: 0,  position: "DF" },
    { id: 4, name: "Pham Van D", goals: 12, position: "FW" },
    { id: 5, name: "Dang Van E", goals: 0,  position: "GK" }
];

let running = true;

while (running) {

    let choice = prompt(
`--- FOOTBALL MANAGER PRO ---

1. Xem đội hình
2. Thêm cầu thủ
3. Tìm kiếm (theo ID)
4. Cập nhật bàn thắng
5. Xóa cầu thủ
0. Thoát

Bạn chọn:`
    );

    switch (choice) {

        case "1":
            console.log("=== DANH SÁCH ===");
            squad.forEach(function(player) {
                console.log(
                    `Mã ${player.id} - ${player.name} (${player.position}): ${player.goals} bàn`
                );
            });
            break;

        case "2":
            let name = prompt("Nhập tên cầu thủ:");
            let goals = Number(prompt("Nhập số bàn thắng:"));
            let position = prompt("Nhập vị trí:");

            let newPlayer = {
                id: squad.length > 0 ? squad[squad.length - 1].id + 1 : 1,
                name: name,
                goals: goals,
                position: position
            };

            squad.push(newPlayer);
            alert("Đã thêm cầu thủ!");
            break;

        case "3":
            let findId = Number(prompt("Nhập ID cần tìm:"));
            let foundPlayer = squad.find(player => player.id === findId);

            if (foundPlayer) {
                console.log(foundPlayer);
            } else {
                alert("Không tìm thấy!");
            }
            break;

        case "4":
            let updateId = Number(prompt("Nhập ID vừa ghi bàn:"));
            let playerToUpdate = squad.find(player => player.id === updateId);

            if (playerToUpdate) {
                playerToUpdate.goals += 1;
                alert(`${playerToUpdate.name} hiện có ${playerToUpdate.goals} bàn`);
            } else {
                alert("Không tìm thấy!");
            }
            break;

        case "5":
            let deleteId = Number(prompt("Nhập ID cần xóa:"));
            let index = squad.findIndex(player => player.id === deleteId);

            if (index !== -1) {
                squad.splice(index, 1);
                alert("Đã xóa cầu thủ!");
            } else {
                alert("Không tìm thấy!");
            }
            break;

        case "0":
            running = false;
            alert("Thoát chương trình");
            break;

        default:
            alert("Lựa chọn không hợp lệ!");
    }
}
</script>

</body>
</html>
