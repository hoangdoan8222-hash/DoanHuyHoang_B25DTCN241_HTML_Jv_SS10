<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Report</title>
</head>
<body>

<script>
let players = [
    { name: "Messi", matches: 34, goals: 25, assists: 15, yellowCards: 4 },
    { name: "Ronaldo", matches: 38, goals: 30, assists: 10, yellowCards: 3 },
    { name: "Neymar", matches: 32, goals: 18, assists: 20, yellowCards: 5 },
    { name: "Mbappe", matches: 20, goals: 15, assists: 8, yellowCards: 2 }
];

function generateRankingReport(minMatches, players) {

    let filtered = players.filter(p => p.matches >= minMatches);

    let enhanced = filtered.map((p, index) => {

        let performanceScore = (p.goals + p.assists) / p.matches;
        performanceScore = Number(performanceScore.toFixed(2));

        let efficiencyScore = performanceScore - (p.yellowCards / p.matches) * 10;
        efficiencyScore = Number(efficiencyScore.toFixed(2));

        return {
            ...p,
            performanceScore: performanceScore,
            efficiencyScore: efficiencyScore,
            originalIndex: index
        };
    });

    enhanced.sort((a, b) => {
        if (b.efficiencyScore !== a.efficiencyScore)
            return b.efficiencyScore - a.efficiencyScore;

        if (b.performanceScore !== a.performanceScore)
            return b.performanceScore - a.performanceScore;

        if (b.goals !== a.goals)
            return b.goals - a.goals;

        return a.originalIndex - b.originalIndex;
    });

    console.log("XẾP HẠNG ĐỘI BÓNG (từ", minMatches, "trở lên)\n");

    enhanced.forEach((p, i) => {
        console.log(
            (i + 1) + ". " + p.name +
            " - Efficiency: " + p.efficiencyScore +
            " | Performance: " + p.performanceScore +
            " | Goals: " + p.goals
        );
    });

    console.log("\nTổng số cầu thủ xếp hạng:", enhanced.length);

    if (enhanced.length > 0) {

        console.log("Cầu thủ xuất sắc nhất:", enhanced[0].name);

        let top3 = enhanced.slice(0, 3);

        let avgEfficiency = top3.reduce((sum, p) => sum + p.efficiencyScore, 0) / top3.length;
        avgEfficiency = Number(avgEfficiency.toFixed(2));

        console.log("Trung bình efficiency top 3:", avgEfficiency);
    }
}

generateRankingReport(30, players);
</script>

</body>
</html>
